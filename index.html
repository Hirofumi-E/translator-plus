<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#111816">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Translator+">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Translator+</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./translator-icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./translator-icon.svg">
  <style>
    :root {
      color-scheme: dark;
      --bg: #0d1211;
      --panel: #171f1d;
      --panel-2: #1d2825;
      --field: #101715;
      --ink: #edf6f2;
      --muted: #9fb0aa;
      --line: #31413d;
      --accent: #4fc3b1;
      --accent-2: #82aef3;
      --warn: #f0b36a;
      --danger: #ff8585;
      --soft: #121a18;
      --shadow: 0 18px 48px rgba(0, 0, 0, 0.38);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(79, 195, 177, 0.10), transparent 34%),
        linear-gradient(315deg, rgba(130, 174, 243, 0.08), transparent 38%),
        var(--bg);
      -webkit-text-size-adjust: 100%;
    }

    button,
    select,
    input,
    textarea {
      font: inherit;
    }

    button,
    select,
    summary {
      touch-action: manipulation;
    }

    .app {
      width: min(1240px, calc(100% - 28px));
      min-height: 100vh;
      margin: 0 auto;
      padding: 18px 0;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 12px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.5rem, 2.5vw, 2.4rem);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .status {
      min-width: 148px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(23, 31, 29, 0.88);
      color: var(--muted);
      padding: 9px 12px;
      text-align: center;
      white-space: nowrap;
    }

    .status.busy {
      color: var(--accent);
      border-color: rgba(79, 195, 177, 0.45);
    }

    .status.warn {
      color: var(--warn);
      border-color: rgba(240, 179, 106, 0.45);
    }

    .status.error {
      color: var(--danger);
      border-color: rgba(255, 133, 133, 0.45);
    }

    .toolbar,
    .settings {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(23, 31, 29, 0.9);
      box-shadow: var(--shadow);
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(150px, 1.1fr) minmax(132px, 1fr) 44px minmax(132px, 1fr) auto;
      align-items: end;
      gap: 10px;
      padding: 12px;
    }

    label {
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
    }

    select,
    input {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--field);
      color: var(--ink);
      outline: none;
      padding: 0 11px;
    }

    select:focus,
    input:focus,
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79, 195, 177, 0.16);
    }

    .icon-button,
    .text-button {
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
      color: var(--ink);
      cursor: pointer;
    }

    .icon-button {
      width: 44px;
      display: inline-grid;
      place-items: center;
      color: var(--accent);
      font-weight: 800;
    }

    .text-button {
      padding: 0 13px;
      font-weight: 700;
    }

    .text-button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #08110f;
    }

    .text-button.secondary {
      border-color: rgba(130, 174, 243, 0.38);
      color: var(--accent-2);
    }

    .icon-button:hover,
    .text-button:hover {
      border-color: var(--accent);
    }

    .panes {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      min-height: 520px;
    }

    .pane {
      min-width: 0;
      display: grid;
      grid-template-rows: auto 1fr auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .pane-head,
    .pane-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 11px 13px;
      color: var(--muted);
    }

    .pane-head {
      border-bottom: 1px solid var(--line);
    }

    .pane-foot {
      min-height: 48px;
      border-top: 1px solid var(--line);
      font-size: 0.86rem;
    }

    .pane-title {
      color: var(--ink);
      font-weight: 800;
    }

    .actions {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    textarea {
      width: 100%;
      min-width: 0;
      min-height: 380px;
      resize: none;
      border: 0;
      outline: none;
      padding: 15px;
      color: var(--ink);
      background: var(--field);
      line-height: 1.65;
      font-size: 1rem;
    }

    #outputText {
      background: var(--soft);
    }

    .settings {
      overflow: hidden;
    }

    summary {
      cursor: pointer;
      padding: 12px 14px;
      color: var(--accent);
      font-weight: 800;
    }

    .settings-body {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 0 14px 14px;
    }

    .setting-wide {
      grid-column: 1 / -1;
    }

    .note {
      margin: 0;
      grid-column: 1 / -1;
      color: var(--muted);
      line-height: 1.5;
      font-size: 0.9rem;
    }

    @media (max-width: 820px) {
      .app {
        width: min(100% - 16px, 640px);
        padding: 10px 0;
      }

      header,
      .panes,
      .settings-body {
        grid-template-columns: 1fr;
      }

      header {
        display: grid;
      }

      .toolbar {
        grid-template-columns: 1fr 46px 1fr;
      }

      .toolbar label:first-child {
        grid-column: 1 / -1;
      }

      .toolbar .text-button.primary {
        grid-column: 1 / -1;
      }

      select,
      input,
      textarea {
        font-size: 16px;
      }

      select,
      input,
      .icon-button,
      .text-button {
        min-height: 46px;
      }

      .panes {
        min-height: 0;
      }

      textarea {
        min-height: 250px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <h1>Translator+</h1>
      <div id="status" class="status">待機中</div>
    </header>

    <section class="toolbar" aria-label="翻訳設定">
      <label>
        翻訳エンジン
        <select id="provider">
          <option value="google">Google 非公式</option>
          <option value="mymemory">MyMemory 無料API</option>
          <option value="libretranslate">LibreTranslate</option>
        </select>
      </label>

      <label>
        元の言語
        <select id="sourceLang">
          <option value="auto">自動判定</option>
          <option value="ja">日本語</option>
          <option value="en">English</option>
          <option value="tl">Tagalog</option>
          <option value="ko">한국어</option>
          <option value="zh">中文</option>
          <option value="es">Español</option>
          <option value="fr">Français</option>
          <option value="de">Deutsch</option>
        </select>
      </label>

      <button id="swapButton" class="icon-button" title="入れ替え" aria-label="入れ替え">⇄</button>

      <label>
        翻訳先
        <select id="targetLang">
          <option value="ja">日本語</option>
          <option value="en">English</option>
          <option value="tl">Tagalog</option>
          <option value="ko">한국어</option>
          <option value="zh">中文</option>
          <option value="es">Español</option>
          <option value="fr">Français</option>
          <option value="de">Deutsch</option>
        </select>
      </label>

      <button id="translateButton" class="text-button primary">翻訳</button>
    </section>

    <section class="panes">
      <article class="pane">
        <div class="pane-head">
          <span class="pane-title">入力</span>
          <div class="actions">
            <button id="pasteButton" class="text-button secondary">貼付</button>
            <button id="copyInputButton" class="text-button secondary">コピー</button>
            <button id="clearButton" class="text-button">消去</button>
          </div>
        </div>
        <textarea id="inputText" placeholder="翻訳したいテキストを入力"></textarea>
        <div class="pane-foot">
          <span id="inputCount">0文字</span>
          <span>自動翻訳 0.6秒</span>
        </div>
      </article>

      <article class="pane">
        <div class="pane-head">
          <span class="pane-title">結果</span>
          <div class="actions">
            <button id="copyOutputButton" class="text-button secondary">コピー</button>
          </div>
        </div>
        <textarea id="outputText" placeholder="翻訳結果がここに表示されます"></textarea>
        <div class="pane-foot">
          <span id="outputCount">0文字</span>
          <span id="copyStatus"></span>
        </div>
      </article>
    </section>

    <details class="settings">
      <summary>接続設定</summary>
      <div class="settings-body">
        <label class="setting-wide">
          LibreTranslate API URL
          <input id="libreUrl" value="http://localhost:5000/translate">
        </label>
        <label>
          LibreTranslate APIキー
          <input id="libreKey" placeholder="必要な場合のみ">
        </label>
        <label>
          MyMemory email
          <input id="myMemoryEmail" placeholder="任意">
        </label>
        <p class="note">秘密の文章は自前のLibreTranslateだけに送る運用が安全です。Google非公式とMyMemoryは外部サービスへ入力文を送信します。</p>
      </div>
    </details>
  </main>

  <script>
    const provider = document.querySelector("#provider");
    const sourceLang = document.querySelector("#sourceLang");
    const targetLang = document.querySelector("#targetLang");
    const inputText = document.querySelector("#inputText");
    const outputText = document.querySelector("#outputText");
    const inputCount = document.querySelector("#inputCount");
    const outputCount = document.querySelector("#outputCount");
    const statusBox = document.querySelector("#status");
    const copyStatus = document.querySelector("#copyStatus");
    const libreUrl = document.querySelector("#libreUrl");
    const libreKey = document.querySelector("#libreKey");
    const myMemoryEmail = document.querySelector("#myMemoryEmail");
    const translateButton = document.querySelector("#translateButton");
    const swapButton = document.querySelector("#swapButton");
    const pasteButton = document.querySelector("#pasteButton");
    const copyInputButton = document.querySelector("#copyInputButton");
    const copyOutputButton = document.querySelector("#copyOutputButton");
    const clearButton = document.querySelector("#clearButton");

    const GOOGLE_CHUNK_LIMIT = 4200;
    const MYMEMORY_CHUNK_LIMIT = 450;
    const LIBRE_CHUNK_LIMIT = 3500;

    let translateTimer = 0;
    let activeController = null;
    let currentOutput = "";

    const saved = JSON.parse(localStorage.getItem("translatorPlusSettings") || "{}");
    provider.value = saved.provider || "google";
    sourceLang.value = saved.sourceLang || "auto";
    targetLang.value = saved.targetLang || "ja";
    libreUrl.value = saved.libreUrl || libreUrl.value;
    libreKey.value = saved.libreKey || "";
    myMemoryEmail.value = saved.myMemoryEmail || "";

    function saveSettings() {
      localStorage.setItem("translatorPlusSettings", JSON.stringify({
        provider: provider.value,
        sourceLang: sourceLang.value,
        targetLang: targetLang.value,
        libreUrl: libreUrl.value.trim(),
        libreKey: libreKey.value.trim(),
        myMemoryEmail: myMemoryEmail.value.trim()
      }));
    }

    function mapLangForProvider(language, engine) {
      if (language === "auto") return "auto";
      if (engine === "google" && language === "tl") return "fil";
      return language;
    }

    function detectLanguage(text) {
      if (/[\u3040-\u30ff\u3400-\u9fff]/.test(text)) return "ja";
      if (/[\uac00-\ud7af]/.test(text)) return "ko";
      if (/[\u0400-\u04ff]/.test(text)) return "ru";
      if (/[ñÑ]|\b(ang|ng|mga|ako|ikaw|siya|kami|kayo|sila)\b/i.test(text)) return "tl";
      return "en";
    }

    function looksLikeLanguage(text, language) {
      const value = text || "";
      if (language === "ja") return /[\u3040-\u30ff\u3400-\u9fff]/.test(value);
      if (language === "ko") return /[\uac00-\ud7af]/.test(value);
      if (language === "zh") return /[\u3400-\u9fff]/.test(value);
      return /[A-Za-zÀ-ÿ]/.test(value);
    }

    function splitText(text, maxLength) {
      const chunks = [];
      let rest = text.trim();

      while (rest.length > maxLength) {
        const windowText = rest.slice(0, maxLength);
        const punctuationBreak = Math.max(
          windowText.lastIndexOf("。"),
          windowText.lastIndexOf("！"),
          windowText.lastIndexOf("？"),
          windowText.lastIndexOf("."),
          windowText.lastIndexOf("!"),
          windowText.lastIndexOf("?"),
          windowText.lastIndexOf("\n")
        );
        const softBreak = Math.max(
          windowText.lastIndexOf(" "),
          windowText.lastIndexOf("　"),
          windowText.lastIndexOf(","),
          windowText.lastIndexOf("、")
        );
        const breakAt = punctuationBreak > 120
          ? punctuationBreak + 1
          : softBreak > 120
            ? softBreak + 1
            : maxLength;

        chunks.push(rest.slice(0, breakAt).trim());
        rest = rest.slice(breakAt).trim();
      }

      if (rest) chunks.push(rest);
      return chunks;
    }

    function setStatus(message, mode = "") {
      statusBox.textContent = message;
      statusBox.className = `status ${mode}`.trim();
    }

    function updateCounts() {
      inputCount.textContent = `${inputText.value.length}文字`;
      outputCount.textContent = `${outputText.value.length}文字`;
    }

    function scheduleTranslate() {
      saveSettings();
      updateCounts();
      copyStatus.textContent = "";
      clearTimeout(translateTimer);
      translateTimer = window.setTimeout(translate, 600);
    }

    function getActualSource(text) {
      return sourceLang.value === "auto" ? detectLanguage(text) : sourceLang.value;
    }

    async function translate() {
      const text = inputText.value.trim();
      const engine = provider.value;
      const actualSource = getActualSource(text);
      const target = targetLang.value;

      if (!text) {
        outputText.value = "";
        currentOutput = "";
        updateCounts();
        setStatus("待機中");
        return;
      }

      if (actualSource === target) {
        outputText.value = text;
        currentOutput = text;
        updateCounts();
        setStatus("同じ言語", "warn");
        return;
      }

      if (activeController) activeController.abort();
      activeController = new AbortController();
      translateButton.disabled = true;
      setStatus("翻訳中", "busy");

      try {
        const translated = await translateByProvider(
          engine,
          text,
          actualSource,
          target,
          activeController.signal,
          (done, total) => {
            setStatus(total > 1 ? `翻訳中 ${done}/${total}` : "翻訳中", "busy");
          }
        );

        outputText.value = translated;
        currentOutput = translated;
        updateCounts();
        setStatus("完了");
      } catch (error) {
        if (error.name === "AbortError") return;
        outputText.value = error.message || "翻訳に失敗しました";
        currentOutput = outputText.value;
        updateCounts();
        setStatus("翻訳失敗", "error");
      } finally {
        translateButton.disabled = false;
      }
    }

    async function translateByProvider(engine, text, source, target, signal, onProgress) {
      if (engine === "google") {
        return translateChunks(text, GOOGLE_CHUNK_LIMIT, chunk =>
          translateGoogleChunk(chunk, source, target, signal), onProgress);
      }

      if (engine === "mymemory") {
        return translateChunks(text, MYMEMORY_CHUNK_LIMIT, chunk =>
          translateMyMemoryChunk(chunk, source, target, signal), onProgress);
      }

      return translateChunks(text, LIBRE_CHUNK_LIMIT, chunk =>
        translateLibreChunk(chunk, source, target, signal), onProgress);
    }

    async function translateChunks(text, limit, translateChunk, onProgress) {
      const chunks = splitText(text, limit);
      const translated = [];
      onProgress(0, chunks.length);

      for (const [index, chunk] of chunks.entries()) {
        translated.push(await translateChunk(chunk));
        onProgress(index + 1, chunks.length);
      }

      return translated.join("\n");
    }

    async function translateGoogleChunk(text, source, target, signal) {
      const url = new URL("https://translate.googleapis.com/translate_a/single");
      url.searchParams.set("client", "gtx");
      url.searchParams.set("sl", mapLangForProvider(source, "google"));
      url.searchParams.set("tl", mapLangForProvider(target, "google"));
      url.searchParams.set("dt", "t");
      url.searchParams.set("q", text);

      const response = await fetch(url, { signal });
      if (!response.ok) throw new Error(`Google HTTP ${response.status}`);

      const data = await response.json();
      const result = Array.isArray(data?.[0])
        ? data[0].map(item => item?.[0] || "").join("")
        : "";
      if (!result) throw new Error("Google翻訳の結果が空です");
      return target === "en" ? result.charAt(0).toUpperCase() + result.slice(1) : result;
    }

    async function translateMyMemoryChunk(text, source, target, signal) {
      const url = new URL("https://api.mymemory.translated.net/get");
      url.searchParams.set("q", text);
      url.searchParams.set("langpair", `${source}|${target}`);
      if (myMemoryEmail.value.trim()) url.searchParams.set("de", myMemoryEmail.value.trim());

      const response = await fetch(url, { signal });
      if (!response.ok) throw new Error(`MyMemory HTTP ${response.status}`);

      const data = await response.json();
      const translated = pickBestMyMemoryTranslation(data, target);
      if (/QUERY LENGTH LIMIT EXCEEDED/i.test(translated)) {
        throw new Error("MyMemoryの1回あたり文字数制限を超えました");
      }
      if (!translated) throw new Error("MyMemoryの結果が空です");
      return translated;
    }

    function pickBestMyMemoryTranslation(data, target) {
      const responseText = data?.responseData?.translatedText || "";
      const matches = Array.isArray(data?.matches) ? data.matches : [];
      const ranked = matches
        .map(match => ({
          text: match.translation || "",
          match: Number(match.match) || 0,
          quality: Number(match.quality) || 0,
          fit: looksLikeLanguage(match.translation, target) ? 1 : 0
        }))
        .filter(item => item.text.trim())
        .sort((a, b) =>
          b.fit - a.fit ||
          b.match - a.match ||
          b.quality - a.quality ||
          a.text.length - b.text.length
        );
      return ranked[0]?.text || responseText;
    }

    async function translateLibreChunk(text, source, target, signal) {
      const endpoint = libreUrl.value.trim();
      if (!endpoint) throw new Error("LibreTranslate API URLが必要です");

      const body = {
        q: text,
        source,
        target,
        format: "text"
      };
      if (libreKey.value.trim()) body.api_key = libreKey.value.trim();

      const response = await fetch(endpoint, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
        signal
      });
      if (!response.ok) throw new Error(`LibreTranslate HTTP ${response.status}`);

      const data = await response.json();
      const translated = data.translatedText || data.translation || "";
      if (!translated) throw new Error("LibreTranslateの結果が空です");
      return translated;
    }

    async function copyText(value) {
      if (!value.trim()) {
        copyStatus.textContent = "内容なし";
        return;
      }
      await navigator.clipboard.writeText(value);
      copyStatus.textContent = "コピー済み";
      window.setTimeout(() => copyStatus.textContent = "", 1500);
    }

    function swapLanguages() {
      if (sourceLang.value === "auto") {
        sourceLang.value = getActualSource(inputText.value);
      }

      const oldSource = sourceLang.value;
      sourceLang.value = targetLang.value;
      targetLang.value = oldSource;

      const oldInput = inputText.value;
      inputText.value = currentOutput || outputText.value;
      outputText.value = oldInput;
      currentOutput = outputText.value;
      scheduleTranslate();
    }

    provider.addEventListener("change", scheduleTranslate);
    sourceLang.addEventListener("change", scheduleTranslate);
    targetLang.addEventListener("change", scheduleTranslate);
    libreUrl.addEventListener("change", scheduleTranslate);
    libreKey.addEventListener("change", saveSettings);
    myMemoryEmail.addEventListener("change", saveSettings);
    inputText.addEventListener("input", scheduleTranslate);
    outputText.addEventListener("input", () => {
      currentOutput = outputText.value;
      updateCounts();
    });
    translateButton.addEventListener("click", translate);
    swapButton.addEventListener("click", swapLanguages);
    clearButton.addEventListener("click", () => {
      inputText.value = "";
      outputText.value = "";
      currentOutput = "";
      updateCounts();
      setStatus("待機中");
    });
    copyInputButton.addEventListener("click", () => copyText(inputText.value));
    copyOutputButton.addEventListener("click", () => copyText(outputText.value));
    pasteButton.addEventListener("click", async () => {
      try {
        inputText.value = await navigator.clipboard.readText();
        scheduleTranslate();
      } catch {
        setStatus("貼付失敗", "error");
      }
    });

    if ("serviceWorker" in navigator && location.protocol !== "file:") {
      navigator.serviceWorker.register("./sw.js").catch(() => {});
    }

    updateCounts();
  </script>
</body>
</html>
